<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Start Page</title>
        <link rel="stylesheet" href="../styles/styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>

    <body>
        <div class="container">
            <h1>Gossip Tales 💋</h1>
            <p>You're finally in high school, but it isn't what you expected—It's <strong>a nightmare!</strong><br>
                Before we continue, what should we call you?</p>
            <form name="startForm" action="situation.html" onsubmit="return validateForm()">
                <input type="text" id="name" class="input" placeholder="Name">
                <br><span id="nameError" style="color: red; display: none; padding-top: 5px;">Please enter your name!</span><br>
                <button class="button" type="submit">Start!</button>
            </form>
        </div>

        <script>
            function validateForm() {
                let x = document.forms["startForm"]["name"].value;
                let errorSpan = document.getElementById("nameError");

                if (x == "" || x == null) {
                    errorSpan.style.display = "inline";
                    return false;
                } else {
                    errorSpan.style.display = "none";
                    localStorage.setItem("name", x.trim());
                    return true;
                }
            }
        </script>
    </body>
</html>
